name: Deploy to Firebase Hosting

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install & Export
        working-directory: app
        run: |
          npm ci
          npx expo export --platform web --output-dir dist

      - name: Deploy to Firebase
        run: |
          npx firebase-tools hosting:sites:create invos-agent --project invos-sales-dashboard --token "${{ secrets.FIREBASE_TOKEN }}" 2>&1 || true
          npx firebase-tools deploy --only hosting:invos-agent --project invos-sales-dashboard --token "${{ secrets.FIREBASE_TOKEN }}"
